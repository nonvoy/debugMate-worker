[tool.ruff]
target-version = "py313"
line-length = 150

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors - check code against some of the style conventions in PEP 8.
    "F",  # pyflakes - analyzes programs and detects various errors.
    "I",  # isort (imports)
    "B",  # bugbear - a plugin for flake8 finding likely bugs and design problems in program.
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
files = ["src"]
show_error_codes = true
pretty = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = [
    "celery",
    "kombu.utils.url",
]
ignore_missing_imports = true
