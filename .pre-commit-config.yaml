default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --output-file, ruff_report.txt]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        pass_filenames: false
        args: [--junit-xml, mypy_report.xml]
        additional_dependencies:
          - pydantic==2.13.4
          - pydantic-settings==2.14.1
          - celery==5.6.3
          - opensearch-py==3.2.0
          - sqlmodel==0.0.38
